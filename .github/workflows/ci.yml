name: OMI Studio CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  deployments: write

concurrency:
  group: omi-studio-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: package
        shell: bash
        run: |
          echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Export build variables
        shell: bash
        run: |
          echo "VITE_APP_VERSION=${{ steps.package.outputs.version }}" >> "$GITHUB_ENV"
          echo "VITE_BUILD_NUMBER=${{ github.run_number }}" >> "$GITHUB_ENV"
          echo "VITE_COMMIT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          echo "VITE_BUILD_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')" >> "$GITHUB_ENV"

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Production
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    environment:
      name: production
      url: https://studio.openmanuscript.org

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: 85.215.185.85
          port: 22
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail

            export PATH="/var/www/vhosts/openmanuscript.org/.nodenv/shims:$PATH"

            cd /var/www/vhosts/openmanuscript.org/studio/repository

            git fetch origin main
            git reset --hard origin/main

            APP_VERSION="$(node -p "require('./package.json').version")"
            BUILD_NUMBER="${{ github.run_number }}"
            COMMIT_SHA="${{ github.sha }}"
            COMMIT_SHORT="${COMMIT_SHA:0:7}"
            BUILD_DATE="$(date -u '+%Y-%m-%d %H:%M UTC')"

            export VITE_APP_VERSION="$APP_VERSION"
            export VITE_BUILD_NUMBER="$BUILD_NUMBER"
            export VITE_COMMIT_SHA="$COMMIT_SHORT"
            export VITE_BUILD_DATE="$BUILD_DATE"

            npm ci
            npm run build

            rsync -a --delete \
              dist/ \
              /var/www/vhosts/openmanuscript.org/studio/httpdocs/
